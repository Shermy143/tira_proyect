name: Upload Software to TIRA
on:
  workflow_dispatch:
    inputs:
      directory:
        description: 'The directory that contains the submission. Can be . for the root of the repository'
        required: true
        default: .
jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Set up Dependencies
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install required python packages
        run: |
          python -m pip install --upgrade pip
          pip3 install tira hugginface_hub
      - name: Build, test, and upload image
        run: |
          echo "Ejecutando code-submission..."
          echo "Download model"
          hf download Doffy143/mStyleDistance-Finetunningv2
          
          echo "Iniciando autentificacion en TIRA..."
          tira-cli login --token ${{ secrets.TIRA_CLIENT_TOKEN }}
          
          echo "Login exitoso. Verificando instalacion..."
          tira-cli verify-installation

          echo "Verificacion completada. Iniciando la subida del container a TIRA (PANCLEF 2026)..."
          tira-cli code-submission --path "${{ inputs.directory || '.' }}" --mount-hf-model Doffy143/mStyleDistance-Finetunningv2 --task generative-ai-authorship-verification-panclef-2026 --dataset pan26-generative-ai-detection-smoke-test-20260330-training --tira-vm-id codingmates
